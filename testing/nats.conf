# NATS server config for the swamp-nats-agent local dev harness.
# JetStream enabled — required by the agent (SWAMP_AGENT stream + DLQ stream +
# swamp-agent-files Object Store bucket are auto-created on first connect).
# Anonymous auth — trusted localhost only; production uses nkeys or mTLS.

port: 4222
monitor_port: 8222

jetstream {
  store_dir: "/data"
  max_memory_store: 256MB
  max_file_store:   1GB
}

debug: false
trace: false
logtime: true
